<section class="module module-narrow module-shallow party-tree-facet"
         data-module="party-tree-module"
         data-is-platform="{{ is_platform }}"
         data-active-filters="{{ (active_party_filters or []) | tojson }}">
  <h2 class="module-heading">
    <i class="fa fa-sitemap fa-fw"></i> Parties
  </h2>
  <div class="party-tree-loading" style="padding:8px 12px;">
    <i class="fa fa-spinner fa-spin"></i> Loading&hellip;
  </div>
  <div class="party-tree-container" style="display:none; padding:6px 8px;"></div>
</section>
