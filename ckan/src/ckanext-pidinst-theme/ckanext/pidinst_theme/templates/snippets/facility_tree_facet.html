<section class="module module-narrow module-shallow facility-tree-facet"
         data-module="facility-tree-module"
         data-is-platform="{{ is_platform }}"
         data-active-filters="{{ (active_facility_filters or []) | tojson }}">
  <h2 class="module-heading">
    <i class="fa fa-sitemap fa-fw"></i> Facilities
  </h2>
  <div class="facility-tree-loading" style="padding:8px 12px;">
    <i class="fa fa-spinner fa-spin"></i> Loading&hellip;
  </div>
  <div class="facility-tree-container" style="display:none; padding:6px 8px;"></div>
</section>
