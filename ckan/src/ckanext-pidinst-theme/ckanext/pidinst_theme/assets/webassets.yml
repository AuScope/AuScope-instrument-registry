pidinst_theme-js:
  output: ckanext-pidinst_theme/%(version)s-pidinst_theme.js
  contents:
    - vendor/leaflet/leaflet.js
    - vendor/leaflet-draw/leaflet.draw.js
    - vendor/dataTables/datatables.min.js
    - vendor/jstree/jstree.min.js
    - js/map-module.js
    - js/display-map-module.js
    - js/pidinst-composite-repeating.js
    - js/pidinst-composite-enhancements.js
    - js/for-fields-handler-module.js
    - js/gcmd-fields-handler-module.js
    - js/field-terms-autocomplete-module.js
    - js/jstree-view-module.js
    - js/duplicate-of-module.js
    - js/facet-select-module.js
    - js/party-tree-module.js
    - js/facet-checkboxes-module.js
    - js/facet-collapse-module.js
    - js/ror-party-lookup-module.js
    - js/owner-party-select-module.js
    - js/ror-owner-module.js
    - js/org-visibility-module.js
    - js/analytics-tracking.js
    - js/cover-photo-module.js
    - js/gcmd-taxonomy-tree-module.js
    - js/vocab-picker-module.js
    - js/related-instruments-picker-module.js
    - js/propagation-progress-module.js
    - js/pidinst_theme.js
  extra:
    preload:
      - vendor/jquery
      - vendor/bootstrap

pidinst_theme-css:
  contents:
    - vendor/leaflet/leaflet.css
    - vendor/leaflet-draw/leaflet.draw.css
    - vendor/jstree/themes/default/style.min.css
    - vendor/dataTables/datatables.min.css
    - css/shared_style.css
    - css/pidinst_theme.css
  output: ckanext-pidinst_theme/%(version)s-pidinst_theme.css
