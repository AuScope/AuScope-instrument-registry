group_type: party
about: Party groups used to represent instrument owners, funders, and manufacturers (ROR-backed or custom)
fields:

  # ======================== HIDDEN IDENTITY FIELDS ========================
  # title and name are auto-populated by JS from the identifier fields.

  - field_name: title
    label: Party Name
    required: true

  - field_name: name
    label: URL
    form_snippet: hidden_field.html
    required: true
    validators: not_empty group_name_validator unicode_safe

  # ======================== IDENTIFIER FIELDS ========================
  # party_identifier_type drives the form behaviour:
  #   ROR  → show party_identifier_ror (Select2 search), hide free-text
  #   else → show party_identifier (free text), hide ROR search

  - field_name: party_role
    label: Roles the party plays in relation to instruments
    preset: multiple_checkbox
    required: true
    choices:
      - value: Owner
        label: Owner
      - value: Funder
        label: Funder
      - value: Manufacturer
        label: Manufacturer

  - field_name: party_identifier_type
    label: Party Identifier Type
    preset: select
    required: true
    default: ROR
    form_include_blank_choice: false
    choices:
      - value: ROR
        label: ROR
      - value: GRID
        label: GRID
      - value: DOI
        label: DOI
      - value: local
        label: Local
      - value: URL
        label: URL
    validators: ignore_missing unicode_safe

  - field_name: party_identifier_ror
    label: Party Identifier
    form_snippet: ror_party_lookup.html
    display_snippet: link.html
    help_text: "ROR identifier. Use the search box to find and select a party involved in instruments."
    validators: ignore_missing unicode_safe

  - field_name: party_identifier
    label: Party Identifier
    form_placeholder: e.g. AuScope Passive Seismic Laboratory
    help_text: "Name or identifier for this party"
    validators: ignore_missing unicode_safe

  # ======================== ROR-SPECIFIC FIELDS ========================
  # Auto-populated when a user selects a ROR organisation.
  # Visible (read-only) when identifier type is ROR; hidden otherwise.

  - field_name: ror_hierarchy_display
    label: Hierarchy
    form_attrs:
      readonly: true
    help_text: "Full hierarchy path from ROR, e.g. University > Faculty > Lab"
    validators: ignore_missing unicode_safe

  - field_name: ror_parents_json
    label: Parents JSON
    form_snippet: hidden_field.html
    display_snippet: null
    help_text: JSON array of parent organisations from ROR (root-first)
    validators: ignore_missing unicode_safe

  - field_name: ror_types
    label: Organisation Types
    form_attrs:
      readonly: true
    help_text: ROR organisation types (e.g. education, government, facility)
    validators: ignore_missing unicode_safe

  - field_name: ror_country
    label: Country
    form_attrs:
      readonly: true
    validators: ignore_missing unicode_safe

  # ======================== SHARED FIELDS ========================

  - field_name: party_contact
    label: Contact
    help_text: Contact email for this party
    validators: ignore_missing unicode_safe

  - field_name: website
    label: Website
    validators: ignore_missing url_validator

  - field_name: party_state
    label: State
    preset: select
    choices:
      - value: Australian Capital Territory
        label: Australian Capital Territory
      - value: New South Wales
        label: New South Wales
      - value: Northern Territory
        label: Northern Territory
      - value: Queensland
        label: Queensland
      - value: South Australia
        label: South Australia
      - value: Tasmania
        label: Tasmania
      - value: Victoria
        label: Victoria
      - value: Western Australia
        label: Western Australia

  - field_name: short_description
    label: Short Description
    form_snippet: markdown.html

  - field_name: aliases
    label: Aliases
    help_text: Optional alternate names for this party
    validators: ignore_missing unicode_safe

  # Parent Party – visible only for non-ROR parties.
  # For ROR parties, parents are auto-created via the API on form submit.
  - field_name: parent_party
    label: Parent Party
    form_snippet: party_parent_select.html
    help_text: If this party is part of a larger party, select the parent here.
    validators: ignore_missing unicode_safe
