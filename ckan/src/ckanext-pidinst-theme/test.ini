[DEFAULT]
debug = false
smtp_server = localhost
error_email_from = ckan@localhost

[app:main]
use = config:../../src/ckan/test-core.ini

# Insert any custom config settings to be used when running your extension's
# tests here. These will override the one defined in CKAN core's test-core.ini
ckan.extra_public_paths = /shared/public
ckan.extra_template_paths = /shared/templates
# pidinst_theme chains actions (e.g. taxonomy_term_update) and renders scheming
# form snippets, so the test app must load the plugins those chained actions and
# templates depend on in addition to pidinst_theme itself.
ckan.plugins = taxonomy scheming_datasets scheming_organizations scheming_groups pidinst_theme

# Logging configuration
[loggers]
keys = root, ckan, sqlalchemy

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_ckan]
qualname = ckan
handlers =
level = INFO

[logger_sqlalchemy]
handlers =
qualname = sqlalchemy.engine
level = WARN

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s %(levelname)-5.5s [%(name)s] %(message)s
