name: Release - Tag Based

on:
  workflow_dispatch:
    inputs:
      releaseType:
        description: Release Type
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  packages: write

jobs:
  sanity-check:
    runs-on: ubuntu-latest
    steps:
      - name: Validate release branch rules
        env:
          RELEASE_TYPE: ${{ inputs.releaseType }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          echo "Release type: $RELEASE_TYPE"
          echo "Branch: $REF_NAME"

          if [[ "$RELEASE_TYPE" == "patch" ]]; then
            if [[ "$REF_NAME" != release/* ]]; then
              echo "::error::Patch releases are only allowed from release/* branches."
              exit 1
            fi
          fi

          if [[ "$RELEASE_TYPE" == "minor" || "$RELEASE_TYPE" == "major" ]]; then
            if [[ "$REF_NAME" != "master" ]]; then
              echo "::error::Minor and major releases are only allowed from master."
              exit 1
            fi
          fi

          echo "Branch validation passed."

  prepare-release:
    needs: sanity-check
    runs-on: ubuntu-latest
    outputs:
      new-version: ${{ steps.bump_version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install bump2version
        run: pip install bump2version

      - name: Set up Git identity
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Bump version
        id: bump_version
        env:
          RELEASE_TYPE: ${{ inputs.releaseType }}
        run: |
          bump2version "$RELEASE_TYPE" --config-file ./ckan/setup.cfg
          NEW_VERSION=$(grep '^current_version = ' ./ckan/setup.cfg | sed -E 's/^current_version = //')
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "New version: $NEW_VERSION"

      - name: Push tags and version bump commit
        run: |
          git push origin HEAD
          git push origin --tags

  build-and-push-docker-image:
    needs: prepare-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/auscope/auscope-ckan-pidinst
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.prepare-release.outputs.new-version }}
          labels: |
            org.opencontainers.image.title=auscope-ckan-pidinst
            org.opencontainers.image.description=CKAN PIDINST image
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./ckan
          file: ./ckan/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
