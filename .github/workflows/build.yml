name: Build - Dev and Prod Images

on:
  push:
    branches:
      - master

  workflow_dispatch:
    inputs:
      no_cache:
        description: Build image without Docker cache
        required: false
        default: false
        type: boolean

jobs:
  build-and-push-ghcr:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ vars.USERNAME }}
          password: ${{ secrets.TOKEN }}

      - name: Set build metadata
        id: meta
        run: |
          echo "branch_name=${GITHUB_REF#refs/heads/}" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$(echo "$GITHUB_SHA" | cut -c1-7)" >> "$GITHUB_OUTPUT"
          echo "tag=ghcr.io/auscope/auscope-ckan-pidinst:latest" >> "$GITHUB_OUTPUT"

      - name: Build and Push Docker image to GHCR
        uses: docker/build-push-action@v7
        with:
          context: ./ckan
          file: ./ckan/Dockerfile
          tags: ${{ steps.meta.outputs.tag }}
          push: true
          no-cache: ${{ github.event_name == 'workflow_dispatch' && inputs.no_cache || false }}
          build-args: |
            BRANCH_NAME=${{ steps.meta.outputs.branch_name }}
            COMMIT_SHA=${{ steps.meta.outputs.commit_sha }}
          labels: |
            branch=${{ steps.meta.outputs.branch_name }}
            commit_sha=${{ steps.meta.outputs.commit_sha }}
